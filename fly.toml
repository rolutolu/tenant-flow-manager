# fly.toml app configuration file generated for tenant-flow-manager on 2026-07-08T01:20:56Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tenant-flow-manager'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
